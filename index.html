<style>
:root{--gold:#C9A84C;--gold-light:#F0D080;--green-dark:#0A2A1A;--green-field:#1A5C35;--white:#F5F2EA;--gray:#8A9080;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--green-dark);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(180deg,transparent,transparent 60px,rgba(255,255,255,0.015) 60px,rgba(255,255,255,0.015) 120px);pointer-events:none;z-index:0;}
.container{max-width:1100px;margin:0 auto;padding:0 20px 60px;position:relative;z-index:1;}
header{text-align:center;padding:40px 0 32px;border-bottom:1px solid rgba(201,168,76,0.3);margin-bottom:32px;}
.trophy{font-size:44px;display:block;margin-bottom:6px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,6vw,68px);letter-spacing:0.04em;color:var(--gold);line-height:1;text-shadow:0 0 40px rgba(201,168,76,0.3);}

const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';

let espnGames = [];

// ── SCORING ───────────────────────────────────────────────────────────────
function teamScore(t){const r=RESULTS[t];return r?(r.w*3)+(r.d):0;}
function playerScore(p){return p.picks.filter(Boolean).reduce((s,t)=>s+teamScore(t),0);}
function getRecord(t){const r=RESULTS[t];if(!r||(r.w===0&&r.d===0&&r.l===0))return'Not started';return r.w+'W '+r.d+'D '+r.l+'L';}

// ── ESPN FETCH (display only) ─────────────────────────────────────────────
async function fetchScores(){
  for(const proxy of PROXIES){
    try{
      const res=await fetch(proxy+encodeURIComponent(ESPN_URL),{signal:AbortSignal.timeout(8000)});
      if(!res.ok) continue;
      const text=await res.text();
      let data;
      try{const json=JSON.parse(text);data=json.contents?JSON.parse(json.contents):json;}
      catch(e){continue;}
      if(!data||!Array.isArray(data.events)) continue;
      espnGames=data.events;
      renderScores();
      renderH2H();
      return;
    }catch(e){continue;}
  }
  document.getElementById('scores-container').innerHTML='<div class="scores-msg">⚡ Live scores unavailable right now.</div>';
  document.getElementById('scores-status').textContent='Offline';
}

// ── RENDER: MATCH CARDS ───────────────────────────────────────────────────
function renderScores(){
  const container=document.getElementById('scores-container');
  if(!espnGames.length){
    const today=new Date(),kickoff=new Date('2026-06-11T00:00:00');
    const d=Math.ceil((kickoff-today)/864e5);

    document.getElementById('scores-status').textContent=today<kickoff?'Starts in '+d+'d':'No games today';
    return;
  }
  let hasLive=false;
  const cards=espnGames.map(ev=>{
    const comp=ev.competitions[0];
    const home=comp.competitors.find(c=>c.homeAway==='home');
    const away=comp.competitors.find(c=>c.homeAway==='away');
    const st=ev.status.type;
    const isLive=st.state==='in',isDone=st.state==='post';
    if(isLive) hasLive=true;
    const hf=TEAMS[ESPN_MAP[home?.team.displayName]]?.flag||'🏳️';
    const af=TEAMS[ESPN_MAP[away?.team.displayName]]?.flag||'🏳️';
    const hn=home?.team.shortDisplayName||home?.team.displayName||'?';
    const an=away?.team.shortDisplayName||away?.team.displayName||'?';
    let scoreHTML,stClass='',cardClass='';
    if(isLive){scoreHTML='<div class="game-score">'+away.score+' – '+home.score+'</div>';stClass='ls';cardClass='live';}
    else if(isDone){scoreHTML='<div class="game-score">'+away.score+' – '+home.score+'</div>';cardClass='final';}
    else{scoreHTML='<div class="game-score sched">'+new Date(ev.date).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})+'</div>';}
    const clk=isLive?(st.displayClock||''):isDone?'Final':'';
    const ds=new Date(ev.date).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
    return '<div class="game-card '+cardClass+'"><div class="game-status '+stClass+'">'+(isLive?'● LIVE':isDone?'Final':'Upcoming')+' '+clk+'</div><div class="game-teams"><div class="game-team">'+af+' '+an+'</div>'+scoreHTML+'<div class="game-team away">'+hn+' '+hf+'</div></div><div class="game-info">'+ds+(ev.name.split(' at ')[1]?' · '+ev.name.split(' at ')[1]:'')+'</div></div>';
  }).join('');
  container.innerHTML='<div class="games-grid">'+cards+'</div>';
  document.getElementById('live-dot').className='live-dot'+(hasLive?' active':'');
  document.getElementById('scores-status').textContent=hasLive?'Live now':'Updated '+new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
}

// ── RENDER: H2H SPOTLIGHT ────────────────────────────────────────────────
function renderH2H(){

    const home=comp.competitors.find(c=>c.homeAway==='home');
    const away=comp.competitors.find(c=>c.homeAway==='away');
    if(!home||!away) return;
    const homeName=ESPN_MAP[home.team.displayName]||ESPN_MAP[home.team.name]||ESPN_MAP[home.team.shortDisplayName];
    const awayName=ESPN_MAP[away.team.displayName]||ESPN_MAP[away.team.name]||ESPN_MAP[away.team.shortDisplayName];
    if(!homeName||!awayName) return;
    const homeOwner=DRAFT.find(p=>p.picks.includes(homeName));
    const awayOwner=DRAFT.find(p=>p.picks.includes(awayName));
    if(!homeOwner||!awayOwner||homeOwner.player===awayOwner.player) return;
    matchups.push({ev,home,away,homeName,awayName,homeOwner,awayOwner});
  });
  if(!matchups.length){section.innerHTML='';return;}
  const html=matchups.map(({ev,home,away,homeName,awayName,homeOwner,awayOwner})=>{

    const isLive=st.state==='in',isDone=st.state==='post';
    const hs=parseInt(home.score)||0,as=parseInt(away.score)||0;
    let awayWin=false,homeWin=false;
    if(isDone){if(as>hs)awayWin=true;else if(hs>as)homeWin=true;}
    const awayFlag=TEAMS[awayName]?.flag||'🏳️';
    const homeFlag=TEAMS[homeName]?.flag||'🏳️';
    const kickoff=new Date(ev.date).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    const dateStr=new Date(ev.date).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
    let scoreBlock,clockBlock,awayClass='',homeClass='';
    if(isLive){
      scoreBlock='<div class="h2h-score">'+as+' – '+hs+'</div>';
      clockBlock='<div class="h2h-live-badge"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#E74C3C;margin-right:4px;animation:blink 1s infinite;"></span>LIVE</div><div class="h2h-clock live-clk">'+st.displayClock+'</div>';
    }else if(isDone){
      scoreBlock='<div class="h2h-score">'+as+' – '+hs+'</div>';
      clockBlock='<div class="h2h-clock">Final</div>';
      if(awayWin){awayClass='h2h-winner';homeClass='h2h-loser';}
      else if(homeWin){homeClass='h2h-winner';awayClass='h2h-loser';}
    }else{
      scoreBlock='<div class="h2h-vs">VS</div><div style="font-size:14px;color:var(--white);font-weight:500;margin-top:4px;">'+kickoff+'</div>';
      clockBlock='<div class="h2h-clock">'+dateStr+'</div>';
    }
    return '<div class="h2h-wrap"><div class="h2h-label">🔥 Pool Matchup</div><div class="h2h-card"><div class="h2h-matchup"><div class="h2h-side '+awayClass+'"><div class="h2h-player">'+awayOwner.player+'</div><span class="h2h-flag">'+awayFlag+'</span><div class="h2h-country">'+awayName+'</div><div class="h2h-pts">'+playerScore(awayOwner)+' pts total</div></div><div class="h2h-center">'+scoreBlock+clockBlock+'</div><div class="h2h-side '+homeClass+'"><div class="h2h-player">'+homeOwner.player+'</div><span class="h2h-flag">'+homeFlag+'</span><div class="h2h-country">'+homeName+'</div><div class="h2h-pts">'+playerScore(homeOwner)+' pts total</div></div></div></div></div>';
  }).join('');
  section.innerHTML=html;
}

// ── RENDER: LEADERBOARD ───────────────────────────────────────────────────
function renderLeaderboard(){
  const sorted=DRAFT.map(p=>({...p,total:playerScore(p)})).sort((a,b)=>b.total-a.total);
  const el=document.getElementById('leaderboard-list');
  el.innerHTML='';
  sorted.forEach((p,rank)=>{
    const cls=['rank-1','rank-2','rank-3'][rank]||'rank-other';
    const tl=p.picks.filter(Boolean).map(t=>(TEAMS[t]?.flag||'')+' '+t).join(' · ');
    const card=document.createElement('div');
    card.className='player-card '+cls;
    card.innerHTML='<div class="rank-badge">'+(rank+1)+'</div><div><div class="player-name">'+p.player+'</div><div class="player-teams">'+tl+'</div></div><div class="player-score"><div class="score-num">'+p.total+'</div><div class="score-label">pts</div></div>';
    const detail=document.createElement('div');
    detail.className='teams-detail';
    p.picks.filter(Boolean).forEach(t=>{
      const chip=document.createElement('div');
      chip.className='team-chip';
      chip.innerHTML='<span class="flag">'+(TEAMS[t]?.flag||'🏳️')+'</span><div class="team-chip-info"><div class="team-chip-name">'+t+'</div><div class="team-chip-stage">'+getRecord(t)+'</div></div><div class="team-chip-pts">'+teamScore(t)+' pts</div>';
      detail.appendChild(chip);
    });
    card.appendChild(detail);
    card.addEventListener('click',()=>{detail.classList.toggle('open');card.classList.toggle('expanded');});
    el.appendChild(card);
  });
  document.getElementById('last-updated').textContent='Last updated: '+LAST_UPDATED;
}

// ── RENDER: STANDINGS ─────────────────────────────────────────────────────
function renderStandings(){
  const sorted=DRAFT.map(p=>({...p,total:playerScore(p)})).sort((a,b)=>b.total-a.total);
  const body=document.getElementById('standings-body');
  body.innerHTML='';
  sorted.forEach((p,rank)=>{
    const row=document.createElement('div');
    row.className='standings-row';
    const cols=[0,1,2,3].map(i=>{
      const t=p.picks[i];
      if(!t) return '<div class="col-center" style="color:var(--gray)">—</div>';
      return '<div class="col-center" style="font-size:13px;">'+(TEAMS[t]?.flag||'')+'<br><span style="font-size:11px;color:var(--gray)">'+teamScore(t)+'p</span></div>';
    }).join('');
    row.innerHTML='<div style="color:var(--gray);font-size:13px;">'+(rank+1)+'</div><div style="font-weight:500;">'+p.player+'</div>'+cols+'<div class="col-center pts">'+p.total+'</div>';
    body.appendChild(row);
  });
}

// ── TABS ──────────────────────────────────────────────────────────────────
function showView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='standings') renderStandings();
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderLeaderboard();
fetchScores(); // one-time fetch, no intervals, nothing writes back
</script>
</body>
</html>
